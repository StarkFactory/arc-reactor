# ===========================================
# Arc Reactor - Production Profile
# ===========================================
# Activate: SPRING_PROFILES_ACTIVE=prod

spring:
  flyway:
    enabled: true

logging:
  level:
    com.arc.reactor: INFO
    org.springframework: WARN

spring:
  codec:
    max-in-memory-size: 1MB

management:
  server:
    port: ${MANAGEMENT_PORT:18090}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

arc:
  reactor:
    concurrency:
      max-concurrent-requests: 50
    security-headers:
      enabled: true
    auth:
      public-actuator-health: ${ARC_REACTOR_AUTH_PUBLIC_ACTUATOR_HEALTH:false}
