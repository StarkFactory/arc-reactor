# 도구 라우팅 설정
#
# SystemPromptBuilder가 사용자 프롬프트를 분석할 때 참조하며,
# ToolSelector(SemanticToolSelector, KeywordBasedToolSelector)도
# preferredTools 필드를 사용하여 LLM에 전달할 도구를 필터링한다.
#
# 매칭 규칙:
#   keywords: ANY match (하나라도 포함되면 매칭)
#   requiredKeywords: AND 조건으로 추가 매칭 (keywords + requiredKeywords 모두 필요)
#   excludeKeywords: 이 키워드가 포함되면 매칭 제외
#   regexPatternRef: WorkContextPatterns의 정규식 참조 (ISSUE_KEY, OPENAPI_URL)
#   parentRoute: 부모 라우트의 keywords도 함께 매칭해야 함
#   excludeRoutes: 먼저 매칭된 라우트가 있으면 현재 라우트 제외
#   requiresNoUrl: true이면 OpenAPI URL이 없을 때만 매칭
#   multiKeywordGroups: 여러 키워드 그룹의 AND 조합
#   preferredTools: ToolSelector가 이 라우트 매칭 시 반환할 도구 이름 목록

