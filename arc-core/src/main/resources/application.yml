# ===========================================
# Arc Reactor - AI Agent Application
# ===========================================

server:
  port: 8080
  shutdown: graceful

# ----- LLM Providers -----
# Only providers with API keys set will be activated.
# Set keys via environment variables:
#   export GEMINI_API_KEY=your-key
#   export SPRING_AI_OPENAI_API_KEY=your-key
#   export SPRING_AI_ANTHROPIC_API_KEY=your-key
#
# API keys must be provided via environment variables (no empty-string fallback defaults).
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.0-flash
        embedding:
          api-key: ${GEMINI_API_KEY}
          text:
            options:
              model: gemini-embedding-001
              dimensions: 768
    vectorstore:
      pgvector:
        initialize-schema: ${SPRING_AI_VECTORSTORE_PGVECTOR_INITIALIZE_SCHEMA:false}
        dimensions: 768
    # OpenAI: Set SPRING_AI_OPENAI_API_KEY env var to enable (default model: gpt-4o)
    # Anthropic: Set SPRING_AI_ANTHROPIC_API_KEY env var to enable

# ----- Arc Reactor Agent Settings -----
arc:
  reactor:
    max-tool-calls: 10
    max-tools-per-request: 30

    tool-selection:
      strategy: ${ARC_REACTOR_TOOL_SELECTION_STRATEGY:semantic}
      similarity-threshold: ${ARC_REACTOR_TOOL_SELECTION_SIMILARITY_THRESHOLD:0.3}
      max-results: ${ARC_REACTOR_TOOL_SELECTION_MAX_RESULTS:10}

    approval:
      enabled: ${ARC_REACTOR_APPROVAL_ENABLED:true}

    tool-policy:
      enabled: ${ARC_REACTOR_TOOL_POLICY_ENABLED:true}
      write-tool-names:
        - jira_create_issue
        - jira_add_comment
        - jira_update_issue
        - jira_transition_issue
        - jira_assign_issue
        - jira_link_issues
        - jira_create_subtask
        - confluence_create_page
        - confluence_update_page
        - confluence_create_runbook
        - confluence_create_incident_postmortem
        - confluence_create_sprint_summary
        - confluence_create_meeting_notes
        - confluence_create_weekly_status_report
        - confluence_create_weekly_auto_summary_page
        - bitbucket_approve_pr
        - bitbucket_add_pr_comment
        - work_action_items_to_jira
        - work_release_readiness_pack
      deny-write-channels:
        - slack
      deny-write-message: "Slack에서는 write 도구를 사용할 수 없습니다. 웹 승인 플로우를 이용하세요."

    llm:
      default-provider: gemini
      temperature: 0.1
      max-output-tokens: 4096
      google-search-retrieval-enabled: ${ARC_REACTOR_LLM_GOOGLE_SEARCH_RETRIEVAL_ENABLED:false}

    concurrency:
      max-concurrent-requests: 20
      request-timeout-ms: 30000
      tool-call-timeout-ms: 15000

    guard:
      enabled: true
      rate-limit-per-minute: 20
      rate-limit-per-hour: 200

    auth:
      jwt-secret: ${ARC_REACTOR_AUTH_JWT_SECRET:}
      default-tenant-id: ${ARC_REACTOR_AUTH_DEFAULT_TENANT_ID:default}
      token-revocation-store: ${ARC_REACTOR_AUTH_TOKEN_REVOCATION_STORE:memory}
      token-revocation-redis-key-prefix: ${ARC_REACTOR_AUTH_TOKEN_REVOCATION_REDIS_KEY_PREFIX:arc:auth:revoked}
      public-actuator-health: ${ARC_REACTOR_AUTH_PUBLIC_ACTUATOR_HEALTH:true}

    tool-enrichment:
      requester-aware-tool-names:
        - jira_my_open_issues
        - jira_due_soon_issues
        - jira_blocker_digest
        - jira_daily_briefing
        - jira_search_my_issues_by_text
        - bitbucket_review_queue
        - bitbucket_review_sla_alerts
        - bitbucket_my_authored_prs
        - work_personal_focus_plan
        - work_personal_learning_digest
        - work_personal_interrupt_guard
        - work_personal_end_of_day_wrapup
        - work_prepare_standup_update
        - work_personal_document_search

    boundaries:
      input-min-chars: 1
      input-max-chars: 10000
      system-prompt-max-chars: 50000

    rag:
      enabled: ${ARC_REACTOR_RAG_ENABLED:false}
      similarity-threshold: 0.65
      top-k: 5
      query-transformer: ${ARC_REACTOR_RAG_QUERY_TRANSFORMER:passthrough}
      retrieval-timeout-ms: ${ARC_REACTOR_RAG_RETRIEVAL_TIMEOUT_MS:3000}
      chunking:
        enabled: ${ARC_REACTOR_RAG_CHUNKING_ENABLED:false}
        chunk-size: ${ARC_REACTOR_RAG_CHUNKING_CHUNK_SIZE:512}
        min-chunk-threshold: ${ARC_REACTOR_RAG_CHUNKING_MIN_CHUNK_THRESHOLD:512}
        overlap: ${ARC_REACTOR_RAG_CHUNKING_OVERLAP:50}
      ingestion:
        enabled: ${ARC_REACTOR_RAG_INGESTION_ENABLED:false}
        dynamic:
          enabled: ${ARC_REACTOR_RAG_INGESTION_DYNAMIC_ENABLED:false}
          refresh-ms: ${ARC_REACTOR_RAG_INGESTION_DYNAMIC_REFRESH_MS:10000}
      adaptive-routing:
        enabled: ${ARC_REACTOR_RAG_ADAPTIVE_ROUTING_ENABLED:true}
        timeout-ms: ${ARC_REACTOR_RAG_ADAPTIVE_ROUTING_TIMEOUT_MS:3000}
      compression:
        enabled: ${ARC_REACTOR_RAG_COMPRESSION_ENABLED:false}
        min-content-length: ${ARC_REACTOR_RAG_COMPRESSION_MIN_CONTENT_LENGTH:200}

    tool-result-cache:
      enabled: ${ARC_REACTOR_TOOL_RESULT_CACHE_ENABLED:false}
      ttl-seconds: ${ARC_REACTOR_TOOL_RESULT_CACHE_TTL_SECONDS:60}
      max-size: ${ARC_REACTOR_TOOL_RESULT_CACHE_MAX_SIZE:200}

    citation:
      enabled: ${ARC_REACTOR_CITATION_ENABLED:false}
      format: ${ARC_REACTOR_CITATION_FORMAT:markdown}

    scheduler:
      max-executions-per-job: ${ARC_REACTOR_SCHEDULER_MAX_EXECUTIONS_PER_JOB:100}

    memory:
      user:
        inject-into-prompt: ${ARC_REACTOR_USER_MEMORY_INJECT_INTO_PROMPT:false}
        max-prompt-injection-chars: ${ARC_REACTOR_USER_MEMORY_MAX_PROMPT_INJECTION_CHARS:1000}

    error-report:
      enabled: ${ARC_REACTOR_ERROR_REPORT_ENABLED:false}
      api-key: ${ERROR_REPORT_API_KEY:}
      max-concurrent-requests: 3
      request-timeout-ms: 120000
      max-tool-calls: 25

    output-guard:
      enabled: ${ARC_REACTOR_OUTPUT_GUARD_ENABLED:true}
      custom-patterns:
        - name: "Curl/Wget API bypass"
          pattern: "(?i)\\b(curl|wget|httpie|http\\s+--?)\\s+.*\\b(jira|confluence|bitbucket|atlassian)\\b"
          action: REJECT
        - name: "Fetch/axios API bypass"
          pattern: "(?i)\\b(fetch|axios|requests?\\.(?:get|post|put|patch|delete))\\s*\\(.*\\b(jira|confluence|bitbucket|atlassian)\\b"
          action: REJECT
        - name: "Direct REST API URL bypass"
          pattern: "(?i)https?://[^\\s]*\\b(jira|confluence|bitbucket|atlassian)\\b[^\\s]*/rest/api/"
          action: REJECT

    admin:
      tracing:
        sampling-rate: ${ARC_REACTOR_TRACING_SAMPLING_RATE:1.0}

    mcp:
      security:
        allowed-server-names: ${ARC_REACTOR_MCP_ALLOWED_SERVER_NAMES:atlassian}
      allow-private-addresses: ${ARC_REACTOR_MCP_ALLOW_PRIVATE_ADDRESSES:false}

    slack:
      enabled: ${ARC_REACTOR_SLACK_ENABLED:false}
      transport-mode: ${ARC_REACTOR_SLACK_TRANSPORT_MODE:socket_mode}
      bot-token: ${SLACK_BOT_TOKEN:}
      app-token: ${SLACK_APP_TOKEN:}
      signing-secret: ${SLACK_SIGNING_SECRET:}
      socket-backend: ${ARC_REACTOR_SLACK_SOCKET_BACKEND:java_websocket}
      socket-connect-retry-initial-delay-ms: ${ARC_REACTOR_SLACK_SOCKET_CONNECT_RETRY_INITIAL_DELAY_MS:1000}
      socket-connect-retry-max-delay-ms: ${ARC_REACTOR_SLACK_SOCKET_CONNECT_RETRY_MAX_DELAY_MS:30000}
      signature-verification-enabled: ${ARC_REACTOR_SLACK_SIGNATURE_VERIFICATION:true}
      fail-fast-on-saturation: ${ARC_REACTOR_SLACK_FAIL_FAST_ON_SATURATION:true}
      notify-on-drop: ${ARC_REACTOR_SLACK_NOTIFY_ON_DROP:false}
      api-max-retries: ${ARC_REACTOR_SLACK_API_MAX_RETRIES:2}
      api-retry-default-delay-ms: ${ARC_REACTOR_SLACK_API_RETRY_DEFAULT_DELAY_MS:1000}
      user-email-resolution-enabled: ${ARC_REACTOR_SLACK_USER_EMAIL_RESOLUTION_ENABLED:true}
      user-email-cache-ttl-seconds: ${ARC_REACTOR_SLACK_USER_EMAIL_CACHE_TTL_SECONDS:3600}
      user-email-cache-max-entries: ${ARC_REACTOR_SLACK_USER_EMAIL_CACHE_MAX_ENTRIES:20000}
      event-dedup-enabled: ${ARC_REACTOR_SLACK_EVENT_DEDUP_ENABLED:true}
      event-dedup-ttl-seconds: ${ARC_REACTOR_SLACK_EVENT_DEDUP_TTL_SECONDS:600}
      event-dedup-max-entries: ${ARC_REACTOR_SLACK_EVENT_DEDUP_MAX_ENTRIES:10000}
      process-direct-messages-without-thread: ${ARC_REACTOR_SLACK_PROCESS_DM_WITHOUT_THREAD:false}
      tools:
        enabled: ${ARC_REACTOR_SLACK_TOOLS_ENABLED:false}
        bot-token: ${SLACK_BOT_TOKEN:}
        tool-exposure:
          scope-aware-enabled: ${ARC_REACTOR_SLACK_TOOLS_SCOPE_AWARE_ENABLED:false}
          fail-open-on-scope-resolution-error: ${ARC_REACTOR_SLACK_TOOLS_FAIL_OPEN:true}
          conversation-scope-mode: ${ARC_REACTOR_SLACK_TOOLS_CONVERSATION_SCOPE_MODE:public_only}
        canvas:
          enabled: ${ARC_REACTOR_SLACK_TOOLS_CANVAS_ENABLED:false}
          allowlist-enforced: ${ARC_REACTOR_SLACK_TOOLS_CANVAS_ALLOWLIST_ENFORCED:true}
          max-owned-canvas-ids: ${ARC_REACTOR_SLACK_TOOLS_CANVAS_MAX_OWNED_IDS:5000}

# ----- API Documentation -----
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# ----- Actuator -----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Arc Reactor
    description: AI Agent Framework
    version: ${project.version:unknown}

# ----- Spring WebFlux Multipart (optional override) -----
# Uncomment to cap in-memory buffer before Arc Reactor's per-file limit is evaluated.
# spring:
#   webflux:
#     multipart:
#       max-in-memory-size: 10MB

# ----- Logging -----
logging:
  level:
    com.arc.reactor: INFO
    io.netty.resolver.dns.DnsServerAddressStreamProviders: WARN
