# Arc Reactor Admin Module Default Configuration
# 이 설정은 arc-admin 모듈이 클래스패스에 있을 때만 활성화된다.
arc:
  reactor:
    admin:
      enabled: ${ARC_REACTOR_ADMIN_ENABLED:false}
      privacy:
        store-session-identifiers: ${ARC_REACTOR_ADMIN_PRIVACY_STORE_SESSION_IDENTIFIERS:false}
        store-user-identifiers: ${ARC_REACTOR_ADMIN_PRIVACY_STORE_USER_IDENTIFIERS:false}
      tracing:
        sampling-rate: ${ARC_REACTOR_TRACING_SAMPLING_RATE:1.0}
